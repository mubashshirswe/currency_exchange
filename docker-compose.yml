# Kanonik server fayl: deploy/server/docker-compose.yml (shu bilan bir xil).

name: currency-exchange

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-currency_exchange}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-currency_exchange}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  api:
    image: ${API_IMAGE:?set API_IMAGE in .env}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      ADDR: ":8080"
      ENV: ${ENV:-PROD}
      DB_ADDR: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-currency_exchange}?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PW: ${REDIS_PW:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      JWTSECRET: ${JWTSECRET:?set JWTSECRET in .env}
      JWTExpirationInSeconds: ${JWTExpirationInSeconds:-86400}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./secrets/firebase.json:/secrets/firebase.json:ro

volumes:
  pgdata:
    name: currency-exchange_pgdata
  redisdata:
    name: currency-exchange_redisdata
